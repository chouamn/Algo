server {
  listen       80;
  server_name  _;

  root   /usr/share/nginx/html;
  index  index.html;

  # SPA fallback — any path not matching a file returns index.html so that
  # React Router can handle client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long cache for hashed static assets produced by Vite.
  location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
  }

  # Never cache the HTML entry point so deployments propagate immediately.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}

spring.application.name=algotech-api
server.port=${PORT:8080}

# ----- Database (MySQL) -----
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000

# ----- JPA / Hibernate -----
# Use "validate" or "none" in production if you manage schema via Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ----- SendGrid -----
sendgrid.api-key=${SENDGRID_API_KEY}
sendgrid.from-email=${SENDGRID_FROM_EMAIL}
sendgrid.admin-email=${ADMIN_EMAIL}

# ----- CORS -----
# Comma-separated list of origins. In prod, set to your deployed frontend URL.
app.cors.allowed-origins=${FRONTEND_ORIGIN:http://localhost:5173}

# ----- Logging -----
logging.level.root=INFO
logging.level.com.algotech=INFO
logging.level.org.hibernate.SQL=WARN

# ----- Actuator (optional, kept off by default) -----
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

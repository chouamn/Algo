# Local development profile — runs with zero external dependencies.
# Activate: `mvn spring-boot:run -Dspring-boot.run.profiles=dev`

# ----- H2 in-memory DB (overrides MySQL from application.properties) -----
spring.datasource.url=jdbc:h2:mem:algotech;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 web console at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:algotech)
spring.h2.console.enabled=true

# ----- SendGrid — real env vars win, placeholders only if unset -----
sendgrid.api-key=${SENDGRID_API_KEY:SG.dev-placeholder}
sendgrid.from-email=${SENDGRID_FROM_EMAIL:dev@example.com}
sendgrid.admin-email=${ADMIN_EMAIL:dev@example.com}

# ----- CORS -----
app.cors.allowed-origins=http://localhost:5173
